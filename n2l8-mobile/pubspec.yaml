name: n2l8_mobile
description: "N2L8 Studio - Premium Music & Community Mobile Application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_inappwebview: ^6.1.5
  flutter_dotenv: ^5.1.0
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  url_launcher: ^6.3.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/logo.png
    - assets/mascot.png
